<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Share Hub Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --panel: rgba(255, 255, 255, 0.1);
        --text: #f8fafc;
        --accent: #ff7a59;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, rgba(20, 184, 166, 0.25), transparent 30%), var(--bg);
        color: var(--text);
        padding: 24px;
      }

      main {
        max-width: 420px;
        padding: 32px;
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(16px);
        text-align: center;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
      }

      h1 {
        margin-bottom: 12px;
        font-size: 2rem;
      }

      p {
        line-height: 1.6;
        color: rgba(248, 250, 252, 0.82);
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>QR Share Hub cached the shell for you, but this page needs a connection to sync fresh share links and server data.</p>
      <p><a href="/">Return to the app</a></p>
    </main>
  </body>
</html>
