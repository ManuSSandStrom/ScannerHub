services:
  - type: web
    name: qr-share-hub-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: APP_BASE_URL
        sync: false
